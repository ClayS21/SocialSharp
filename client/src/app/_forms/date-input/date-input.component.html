<div class="mb-3">
    <input 
        type="text"
        [class.is-invalid]="ngControl.touched && ngControl.invalid"
        class="form-control"
        [formControl]="ngControl.control"
        placeholder="{{label}}"
        bsDatepicker
        [bsConfig]="bsConfig"
        [maxDate]="maxDate"
    >

    @if (ngControl.errors?.['required'])
    {
        <div class="invalid-feedback">{{label}} is required</div>
    }
</div>
